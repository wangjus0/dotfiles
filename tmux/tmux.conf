# Prefix
unbind C-b
set -g prefix `
bind ` send-prefix

# 1-based indexing 
set -g pane-base-index 1
set -g base-index 1

# QoL
set -g escape-time 0
set -g mouse on
set -g repeat-time 1000
set -g history-limit 10000
set -g focus-events on
set -g default-terminal "screen-256color"

# Status bar
set -a terminal-features "tmux-256color:RGB"
set -g base-index 1
set -g renumber-windows on   
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=#000000,bg=#6eb3ff"
set -g window-status-format " #I:#W "
set -g status-interval 5
set -g status-left "#S"
set -g status-right ""

# Keybindings
bind | split-window -h -c "#{pane_current_path}" # split the tmux window in the same path
bind - split-window -v -c "#{pane_current_path}" # split the tmux window in the same path
bind c new-window -c "#{pane_current_path}" # create a new tmux tab in the same tab path
bind f resize-pane -Z

bind -r j resize-pane -D 5 
bind -r k resize-pane -U 5 
bind -r l resize-pane -R 5 
bind -r h resize-pane -L 5

bind m command-prompt -p "Move window to index:" "move-window -t '%%'" # renumber pane

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'christoomey/vim-tmux-navigator'

# TPM Initialization (Plugin Manager)
run '~/.config/tmux/plugins/tpm/tpm'
